<!DOCTYPE html>
<html>
<head>
    <title>Mini Sentrix</title>
</head>
<body>

<h1>Incidentes</h1>

<form action="/add" method="post">
    <input type="text" name="title" placeholder="Nuevo incidente">
    <button type="submit">Agregar</button>
</form>

<ul>
    {% for i in incidents %}
        <li>{{ i[1] }} - {{ i[2] }}</li>
    {% endfor %}
</ul>

</body>
</html>
